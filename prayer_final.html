    const NAMES = ["بەیانی", "ڕۆژهەڵات", "نیوەڕۆ", "عەسـر", "مەغریب", "عیشـا"];

    function getPrayerTimesForDate(date) {
        let m = date.getMonth() + 1;
        let d = date.getDate();
        
        if (!PRAYER_DATABASE[m] || !PRAYER_DATABASE[m][d]) {
            m = 5; d = 18; // ئەگەر بەروارەکە نەبوو، کاتی ئەمڕۆ وەک دیفۆڵت دادەنێت
        }
        
        return PRAYER_DATABASE[m][d].map((time, index) => ({ name: NAMES[index], time: time }));
    }

    function updateCountdown() {
        const now = new Date();
        let todayTimes = getPrayerTimesForDate(now);
        
        let nextPrayer = null;
        let targetTime = null;

        // دڵنیابوونەوە لەوەی کاتی ئێستای کۆمپیوتەرەکە بە تەواوی بە ٢٤ کاتژمێری دەخوێندرێتەوە
        const currentHours = now.getHours();
        const currentMinutes = now.getMinutes();

        for (let prayer of todayTimes) {
            const [h, m] = prayer.time.split(':').map(Number);
            let t = new Date();
            t.setHours(h, m, 0, 0);

            if (t > now) {
                nextPrayer = prayer;
                targetTime = t;
                break;
            }
        }

        // ئەگەر هەموو نوێژەکان ڕۆشتبوون (دوای عیشا)، کاتی نوێژی بەیانی سبەینێ حیساب دەکات
        if (!targetTime) {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            let tomorrowTimes = getPrayerTimesForDate(tomorrow);
            
            nextPrayer = tomorrowTimes[0];
            const [h, m] = nextPrayer.time.split(':').map(Number);
            targetTime = new Date();
            targetTime.setDate(targetTime.getDate() + 1);
            targetTime.setHours(h, m, 0, 0);
        }

        const diffSeconds = Math.floor((targetTime - now) / 1000);
        const hrs = Math.floor(diffSeconds / 3600);
        const mins = Math.floor((diffSeconds % 3600) / 60);
        const secs = diffSeconds % 60;

        document.getElementById('hours').textContent = String(hrs).padStart(2, '0');
        document.getElementById('minutes').textContent = String(mins).padStart(2, '0');
        document.getElementById('seconds').textContent = String(secs).padStart(2, '0');
        
        document.getElementById('prayerName').textContent = "بانگی " + nextPrayer.name;
        
        const totalMins = Math.floor(diffSeconds / 60);
        document.getElementById('infoMsg').textContent = `${totalMins} دەقیقە ماوە بۆ بانگی ${nextPrayer.name}`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
