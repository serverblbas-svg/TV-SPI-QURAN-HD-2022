<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI QURAN HD - پەخشی ڕاستەوخۆ و کاتەکانی بانگ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Tahoma', 'Segoe UI', sans-serif; }
        #app { width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        #bottom-right-info { position: absolute; bottom: 25px; right: 35px; z-index: 50; text-align: right; color: #fff; display: flex; flex-direction: column; gap: 5px; }
        #clock-row { display: flex; align-items: center; gap: 15px; }
        #clock { font-size: 2.4em; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        #weather-temp { font-size: 1.5em; color: #ffcc00; text-shadow: 0 2px 6px rgba(0,0,0,0.9); font-weight: bold; }

        #bottom-left-info { position: absolute; bottom: 25px; left: 35px; z-index: 50; color: #fff; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; text-align: left; }
        #hijri-date { font-size: 1.3em; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        #prayer-countdown-container { display: flex; flex-direction: column; align-items: flex-start; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .prayer-text-row { display: flex; align-items: baseline; gap: 6px; }
        .prayer-label { color: #ffcc00; font-size: 1.2em; font-weight: bold; }
        .prayer-time-box { color: #ffffff; font-size: 1.3em; font-weight: bold; font-family: monospace; }
        .prayer-info-msg { font-size: 0.85em; color: #cccccc; margin-top: 2px; }

        #play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 99999999; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.4s; }
        #play-overlay.hidden { opacity: 0; pointer-events: none; }
        .play-btn { background: #ffcc00; border: none; color: #000; padding: 15px 35px; font-size: 1.2em; font-weight: bold; border-radius: 50px; box-shadow: 0 10px 30px rgba(255,204,0,0.4); transition: transform 0.2s; }
        #quranAudioVideo { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="play-overlay" onclick="startPlayer()">
        <button class="play-btn">▶️ دەستپێکردنی پەخشی SPI QURAN HD</button>
    </div>

    <header id="header" class="px-4 md:px-10 lg:px-16 py-3 md:py-5 flex w-full items-center justify-between z-[9999999] fixed top-0 left-0 transition-all duration-300">
        <div class="w-full md:w-2/3 lg:w-1/2 xl:w-1/3 logo text-2xl md:text-4xl lg:text-4xl font-bold text-white">SPI QURAN HD</div>
    </header>

    <section class="main w-full h-screen relative">
        <video id="liveVideo" class="hero w-full h-full object-cover" src="https://i.top4top.io/m_3840kak0k1.mp4" type="video/mp4" autoplay loop muted playsinline></video>
        <div class="absolute flex items-center justify-center w-full h-full top-0 left-0 px-5 z-40 bg-black/30"></div>
    </section>

    <div id="bottom-right-info">
        <div id="clock-row">
            <span id="clock">00:00:00</span>
            <span id="weather-temp">--°C</span>
        </div>
    </div>

    <div id="bottom-left-info">
        <div id="hijri-date">١ محرم ١٤٤٨ هـ</div>
        <div id="prayer-countdown-container">
            <div class="prayer-text-row">
                <span class="prayer-label" id="prayerName">...</span>
                <span class="prayer-time-box">
                    <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
                </span>
            </div>
            <div class="prayer-info-msg" id="infoMsg">بارکردنی کاتەکان...</div>
        </div>
    </div>

    <video id="quranAudioVideo" playsinline crossorigin="anonymous"></video>
</div>

<script>
    const quranURL = 'https://win.holol.com/live/quran/chunklist_w1767678011.m3u8';
    const video = document.getElementById('liveVideo');
    const quranVideo = document.getElementById('quranAudioVideo');
    const overlay = document.getElementById('play-overlay');

    if (Hls.isSupported()) {
        const hls = new Hls(); hls.loadSource(quranURL); hls.attachMedia(quranVideo);
    } else if (quranVideo.canPlayType('application/vnd.apple.mpegurl')) {
        quranVideo.src = quranURL;
    }

    function startPlayer() {
        video.muted = true; quranVideo.muted = false;
        video.play(); quranVideo.play();
        overlay.classList.add('hidden');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
    }
    setInterval(updateClock, 1000); updateClock();

    function updateHijriDate() {
        const options = { calendar: 'islamic-umalqura', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('hijri-date').innerText = new Intl.DateTimeFormat('ar-FR-u-ca-islamic-umalqura', options).format(new Date()) + ' هـ';
    }
    updateHijriDate();

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.1911&longitude=44.0092&current_weather=true');
            const data = await response.json();
            document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
        } catch { document.getElementById('weather-temp').innerText = `35°C`; }
    }
    getWeather(); setInterval(getWeather, 600000);

    let dbInstance = null;
    const NAMES = ["بەیانی", "ڕۆژهەڵات", "نیوەڕۆ", "عەسـر", "مەغریب", "عیشـا"];

    async function startDatabase() {
        try {
            const SQL = await window.initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
            const response = await fetch('prayer_times.db');
            if(!response.ok) throw new Error("Database file missing");
            const buffer = await response.arrayBuffer();
            dbInstance = new SQL.Database(new Uint8Array(buffer));
            
            setInterval(runCountdown, 1000);
            runCountdown();
        } catch (e) {
            console.error(e);
            document.getElementById('infoMsg').textContent = "کێشە لە بارکردنی داتابەیس هەیە";
        }
    }

    function getPrayersFromDB(date) {
        if (!dbInstance) return null;
        const m = date.getMonth() + 1;
        const d = date.getDate();

        try {
            const query = `SELECT time FROM erbil WHERE CAST(month AS INTEGER) = ${m} AND CAST(day AS INTEGER) = ${d} LIMIT 1;`;
            const res = dbInstance.exec(query);
            
            if (res.length > 0 && res[0].values.length > 0) {
                const timeRaw = res[0].values[0][0];
                const timesArray = timeRaw.split(/[\s,;\t]+/).filter(t => t.trim().length > 0);
                return timesArray.slice(0, 6).map((t, i) => ({ name: NAMES[i], time: t }));
            }
        } catch (err) { console.error(err); }
        return null;
    }

    // لێرەدا فۆرماتی کاتەکان بە تەواوی بەپێی کاتژمێری ٢٤ی ڕێکدەخرێنەوە تا هیچ کاتێک باز نەدات
    function parseTimeString(timeStr, index) {
        if (!timeStr) return null;
        const clean = timeStr.replace(/[^0-9]/g, '');
        let hours = 0, minutes = 0;

        if (clean.length >= 4) {
            hours = parseInt(clean.substring(0, 2), 10);
            minutes = parseInt(clean.substring(2, 4), 10);
        } else {
            const parts = timeStr.split(/[:\.]/);
            if (parts.length >= 2) {
                hours = parseInt(parts[0].replace(/[^0-9]/g, ''), 10);
                minutes = parseInt(parts[1].replace(/[^0-9]/g, ''), 10);
            }
        }

        // چارەسەری کێشەی فۆرماتی کاتەکانی دوای نیوەڕۆ لە ناو داتابەیسەکەدا
        if (index >= 2 && hours < 12) { 
            if (index === 2 && hours === 11) { } else { hours += 12; }
        }
        
        return { hours, minutes };
    }

    function runCountdown() {
        const now = new Date();
        let times = getPrayersFromDB(now);
        if (!times) return;

        let next = null, target = null;
        
        // پشکنینی هەموو کاتەکانی نوێژی ئەمڕۆ بەدوای یەکدا
        for (let i = 0; i < times.length; i++) {
            let p = times[i];
            const parsed = parseTimeString(p.time, i);
            if (!parsed) continue;
            
            let t = new Date(); 
            t.setHours(parsed.hours, parsed.minutes, 0, 0);
            
            // ئەگەر کاتەکە لە کاتی ئێستا گەورەتر بوو، واتا ئەمە نوێژی داهاتووە
            if (t > now) { 
                next = p; 
                target = t; 
                break; 
            }
        }

        // ئەگەر نوێژی عیشای ئەمڕۆش تێپەڕی بوو، دەچێتە سەر بەیانی سبەینێ
        if (!target) {
            const tom = new Date(); tom.setDate(tom.getDate() + 1);
            let tomTimes = getPrayersFromDB(tom);
            if (tomTimes && tomTimes[0]) {
                next = tomTimes[0];
                const parsed = parseTimeString(next.time, 0);
                if (parsed) {
                    target = new Date(); target.setDate(target.getDate() + 1);
                    target.setHours(parsed.hours, parsed.minutes, 0, 0);
                }
            }
        }

        if (target && next) {
            const diff = Math.floor((target - now) / 1000);
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;

            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
            
            document.getElementById('prayerName').textContent = "بانگی " + next.name + ":";
            
            // دروستکردنی دەقی ڕوونکەرەوە بەپێی کاتی ماوە
            if (h > 0) {
                document.getElementById('infoMsg').textContent = `${h} سەعات و ${m} خولەک ماوە بۆ بانگی ${next.name}`;
            } else {
                document.getElementById('infoMsg').textContent = `${m} خولەک ماوە بۆ بانگی ${next.name}`;
            }
        }
    }

    window.onload = startDatabase;
</script>
</body>
</html>
