<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI QURAN HD - پەخشی ڕاستەوخۆ</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Tahoma', 'Segoe UI', sans-serif; }
        
        #app { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden;
        }

        /* 🎬 ڤیدیۆی پەخشی ڕاستەوخۆ لە باکگراونددا */
        #liveVideo {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            z-index: 1;
        }

        /* 📺 لۆگۆ و ناوی کەناڵ لە سەرەوەی چەپ (بەبێ چوارگۆشە) */
        #logo-container {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }
        
        #logo-img {
            width: 60px; 
            height: 60px; 
            border-radius: 12px;
            object-fit: cover; 
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.6));
        }
        
        #logo-text {
            font-size: 0.95em; 
            font-weight: bold; 
            color: #ffcc00;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* 🎧 شاشەی دەستپێکردن بۆ ڕێگەپێدانی دەنگی برۆوسەر */
        #play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.4s;
        }
        #play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            background: #ffcc00;
            border: none;
            color: #000;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255,204,0,0.4);
            transition: transform 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="play-overlay" onclick="startPlayer()">
        <button class="play-btn">▶️ دەستپێکردنی پەخشی قورئان</button>
    </div>

    <div id="logo-container">
        <img id="logo-img" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPIQURANHD.png?raw=true" alt="SPI Logo">
        <div id="logo-text">SPI QURAN HD</div>
    </div>

    <video id="liveVideo" playsinline crossorigin="anonymous"></video>
</div>

<script>
    // لینکی ڕاستەوخۆی دەکان قورئان کە ناردت
    const streamURL = 'https://183.bozztv.com/giatv/giatv-dekanquran/dekanquran/chunks.m3u8';
    const video = document.getElementById('liveVideo');
    const overlay = document.getElementById('play-overlay');

    // ڕێکخستنی سیستەمی HLS بۆ لێدانی فۆرماتی m3u8
    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamURL);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // بۆ برۆوسەری Safari (ئایفۆن و ماک) کە خۆی ڕاستەوخۆ پشتگیری دەکات
        video.src = streamURL;
    }

    function startPlayer() {
        video.muted = false; // دەنگەکە کارا دەکات
        video.play().then(() => {
            overlay.classList.add('hidden'); // شاشە ڕەشەکە لادەبات کاتێک لایڤەکە دەستپێدەکات
        }).catch(err => {
            // ئەگەر برۆوسەرەکە کێشەی گرت، سەرەتا بە بێدەنگی لێی دەدات پاشان لۆد دەبێت
            video.muted = true;
            video.play();
            overlay.classList.add('hidden');
        });
    }
</script>

</body>
</html>
