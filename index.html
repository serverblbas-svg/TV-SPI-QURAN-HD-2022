<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI QURAN HD - پەخشی ڕاستەوخۆ</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Tahoma', 'Segoe UI', sans-serif; }
        
        #app { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden;
        }

        /* 🎬 ڤیدیۆی پەخشی ڕاستەوخۆ لە باکگراونددا */
        #liveVideo {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            z-index: 1;
        }

        /* 📺 لۆگۆ و ناوی کەناڵ لە سەرەوەی چەپ (قەبارەکەی گەورەتر کراوە) */
        #logo-container {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }
        
        #logo-img {
            width: 100px; /* لێرەوە قەبارەکەم گەورەتر کردووە */
            height: 100px; 
            border-radius: 14px;
            object-fit: cover; 
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.7));
        }
        
        #logo-text {
            font-size: 1.05em; /* ناوی کەناڵەکەش کەمێک گەورەتر کراوە بۆ ئەوەی لەگەڵ لۆگۆکە بگونجێت */
            font-weight: bold; 
            color: #ffcc00;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* 🎧 شاشەی دەستپێکردن بۆ چالاککردنی ئۆتۆپلەی */
        #play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.4s;
        }
        #play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            background: #ffcc00;
            border: none;
            color: #000;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255,204,0,0.4);
            transition: transform 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.05);
        }

        /* 📜 بەشی زانیاری خەتمی قورئان لە خوارەوە */
        #quran-container {
            position: absolute;
            bottom: 20px;
            left: 5%;
            right: 5%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .quran-header {
            color: #ffcc00;
            font-size: 1.05em;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #current-track-title {
            font-size: 0.9em;
            color: #fff;
            background: rgba(255,254,0,0.1);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,204,0,0.2);
        }

        #audioPlayer { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="play-overlay" onclick="startPlayer()">
        <button class="play-btn">▶️ دەستپێکردنی پەخشی SPI QURAN HD</button>
    </div>

    <div id="logo-container">
        <img id="logo-img" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPIQURANHD.png?raw=true" alt="SPI Logo">
        <div id="logo-text">SPI QURAN HD</div>
    </div>

    <!-- ڤیدیۆی لایڤی حەیوانات (بێدەنگ) -->
    <video id="liveVideo" playsinline crossorigin="anonymous" muted></video>
    
    <!-- دەنگی خەتمی قورئان لە پشتەوە -->
    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <div id="quran-container">
        <div class="quran-header">
            <span>📖 خەتمی قورئانی کەریم (دەنگی شێخ میشاری ڕاشد العفاسي) - بەردەوام لە باکگراوند</span>
            <span id="current-track-title">ئێستا: ئامادەکردن...</span>
        </div>
    </div>
</div>

<script>
    const streamURL = 'https://live-content.xumo.com/3878/content/XM0KZ98BBZD8WF/27513672/master.m3u8';
    const BASE_JUZ_URL = "https://archive.org/download/misyarirasyidperjuz/Al-Quran%20Juz%20";

    const video = document.getElementById('liveVideo');
    const audio = document.getElementById('audioPlayer');
    const overlay = document.getElementById('play-overlay');
    const trackTitle = document.getElementById('current-track-title');

    let currentJuz = 1;

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamURL);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamURL;
    }

    function playJuz(juzNumber) {
        currentJuz = juzNumber;
        const juzNumStr = String(juzNumber).padStart(2, '0');
        audio.src = BASE_JUZ_URL + juzNumStr + ".mp3";
        audio.load();
        
        audio.play().then(() => {
            trackTitle.innerText = 'ئێستا لێدەدات: جزء ' + juzNumber;
        }).catch(err => {
            console.log("Error playing audio: ", err);
        });
    }

    function startPlayer() {
        video.muted = true;
        video.play();
        playJuz(currentJuz);
        overlay.classList.add('hidden');
    }

    audio.onended = function() {
        currentJuz++;
        if (currentJuz > 30) {
            currentJuz = 1;
        }
        playJuz(currentJuz);
    };
</script>

</body>
</html>
