    const video = document.getElementById('liveVideo');
    const quranVideo = document.getElementById('quranAudioVideo');
    const overlay = document.getElementById('play-overlay');

    // HLS Player Setup
    let hls = null;

    function setupHLS() {
        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 600,
                liveSyncDurationCount: 3,
                liveMaxLatencyDurationCount: 10
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log('Network error, trying to recover...');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log('Media error, trying to recover...');
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log('Fatal error, cannot recover');
                            hls.destroy();
                            setupHLS();
                            break;
                    }
                }
            });

            hls.loadSource(quranURL);
            hls.attachMedia(quranVideo);
        } else if (quranVideo.canPlayType('application/vnd.apple.mpegurl')) {
            quranVideo.src = quranURL;
        }
    }

    setupHLS();

    function startPlayer() {
        video.muted = true; 
        quranVideo.muted = false;
        video.play().catch(e => console.log('Video play error:', e));

    function getPrayerTimes(date) {
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const key = `${month}_${day}`;
        const data = PRAYER_DATA[key];
        if (!data) {
            console.warn('هیچ داتایەک بۆ ئەم ڕۆژە نییە:', key);
            return null;
        }

        const times = data.split('|');
        return times.map((t, i) => ({
            name: NAMES[i],
            time: t
        }));
    }

    function parseTimeString(timeStr) {
        if (!timeStr) return null;
        const parts = timeStr.split(':');
        if (parts.length !== 2) return null;
        const hours = parseInt(parts[0], 10);
        const minutes = parseInt(parts[1], 10);
        if (isNaN(hours) || isNaN(minutes)) return null;
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
        return { hours, minutes };
    }

    function runCountdown() {
        const now = new Date();
        const times = getPrayerTimes(now);

            document.getElementById('infoMsg').textContent = "کاتەکان بەردەست نیەن";
            return;
        }

        let next = null;
        let target = null;

        // دۆزینەوەی کاتی دواتری نوێژ
        for (let i = 0; i < times.length; i++) {
            const p = times[i];
            const parsed = parseTimeString(p.time);
            if (!parsed) continue;

            const t = new Date(now);
            t.setHours(parsed.hours, parsed.minutes, 0, 0);

            if (t > now) {
                next = p;
                target = t;

                const parsed = parseTimeString(next.time);
                if (parsed) {
                    target = new Date(now);
                    target.setDate(target.getDate() + 1);
                    target.setHours(parsed.hours, parsed.minutes, 0, 0);
                }

                return;

            const h = Math.floor(diff / 3600);

            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');

            document.getElementById('prayerName').textContent = `کاتی ماوە بۆ ${next.name}:`;

            if (h > 0) {
                document.getElementById('infoMsg').textContent = `${h} سەعات و ${m} خولەک ماوە بۆ ${next.name}`;
            } else if (m > 0) {
                document.getElementById('infoMsg').textContent = `${m} خولەک ماوە بۆ ${next.name}`;
            } else {
                document.getElementById('infoMsg').textContent = `${s} چرکە ماوە بۆ ${next.name}`;
            }
        } else {
            document.getElementById('infoMsg').textContent = "کاتەکان بەردەست نیەن";
        }
    }

    // ==================== UPDATE CLOCK ====================
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = 
            String(now.getHours()).padStart(2, '0') + ":" + 
            String(now.getMinutes()).padStart(2, '0') + ":" + 
            String(now.getSeconds()).padStart(2, '0');
    }

    // ==================== UPDATE HIJRI DATE ====================
    function updateHijriDate() {
        const now = new Date();
        const hijriElement = document.getElementById('hijri-date');
        
        try {
            const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            const hijriDate = formatter.format(now);
            hijriElement.innerText = hijriDate + ' ';
        } catch (e) {
            try {
                const formatter = new Intl.DateTimeFormat('ar-u-ca-islamic', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
                const hijriDate = formatter.format(now);
                hijriElement.innerText = hijriDate + ' هـ';
            } catch (e2) {
                hijriElement.innerText = '--';
            }
        }
    }

    // ==================== GET WEATHER ====================
    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.1911&longitude=44.0092&current_weather=true');
            const data = await response.json();
            document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
        } catch { 
            document.getElementById('weather-temp').innerText = `35°C`; 
        }
    }

    // ==================== UPDATE ALL ====================
    function updateAll() {
        updateClock();
        updateHijriDate();
        runCountdown();
    }

    // ==================== START ====================
    setInterval(updateAll, 1000);
    updateAll();
    getWeather();
    setInterval(getWeather, 300000);

    // Update when page becomes visible again
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            updateAll();
            getWeather();
        }
    });
</script>
</body>
</html>
