<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI QURAN HD - پەخشی ڕاستەوخۆ و کاتەکانی بانگ</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Tahoma', 'Segoe UI', sans-serif; }
        
        #app { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden;
        }

        /* 🎬 ڤیدیۆی پەخشی ڕاستەوخۆ لە باکگراونددا */
        #liveVideo {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            z-index: 1;
        }

        /* 📺 لۆگۆ و ناوی کەناڵ لە سەرەوەی چەپ */
        #logo-container {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }
        
        #logo-img {
            width: 100px; 
            height: 100px; 
            border-radius: 14px;
            object-fit: cover; 
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.7));
        }
        
        #logo-text {
            font-size: 1.05em; 
            font-weight: bold; 
            color: #ffcc00;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* 🕒 بەشی خوارەوەی ڕاست: سەعات و تەنها درجەی کەشوهەوا */
        #bottom-right-info {
            position: absolute;
            bottom: 25px;
            right: 35px;
            z-index: 10;
            text-align: right;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #clock-row {
            display: flex;
            align-items: center;
            gap: 15px; 
        }

        #clock {
            font-size: 2.4em;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        #weather-temp {
            font-size: 1.5em;
            color: #ffcc00;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
            font-weight: bold;
        }

        /* 📅 بەشی خوارەوەی چەپ: مێژووی هیجری و کاونتداونی نوێژ */
        #bottom-left-info {
            position: absolute;
            bottom: 25px;
            left: 35px;
            z-index: 10;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            text-align: left;
        }

        #hijri-date {
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        /* 🕋 دیزاینی مۆدێرنی کاونتداونی نوێژ بۆ لایڤ */
        #prayer-countdown-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        .prayer-text-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .prayer-label {
            color: #ffcc00;
            font-size: 1.2em;
            font-weight: bold;
        }

        .prayer-time-box {
            color: #ffffff;
            font-size: 1.3em;
            font-weight: bold;
            font-family: monospace;
        }

        .prayer-info-msg {
            font-size: 0.85em;
            color: #cccccc;
            margin-top: 2px;
        }

        /* 🎧 شاشەی دەستپێکردن */
        #play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.4s;
        }
        #play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            background: #ffcc00;
            border: none;
            color: #000;
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255,204,0,0.4);
            transition: transform 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.05);
        }

        #quranAudioVideo { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="play-overlay" onclick="startPlayer()">
        <button class="play-btn">▶️ دەستپێکردنی پەخشی SPI QURAN HD</button>
    </div>

    <div id="logo-container">
        <img id="logo-img" src="https://github.com/serverblbas-svg/LOGO/blob/main/SPIQURANHD.png?raw=true" alt="SPI Logo">
        <div id="logo-text">SPI QURAN HD</div>
    </div>

    <div id="bottom-right-info">
        <div id="clock-row">
            <span id="clock">00:00:00</span>
            <span id="weather-temp">--°C</span>
        </div>
    </div>

    <div id="bottom-left-info">
        <div id="hijri-date">١ محرم ١٤٤٨ هـ</div>
        
        <div id="prayer-countdown-container">
            <div class="prayer-text-row">
                <span class="prayer-label" id="prayerName">...</span>
                <span class="prayer-time-box">
                    <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
                </span>
            </div>
            <div class="prayer-info-msg" id="infoMsg">بارکردنی کاتەکان...</div>
        </div>
    </div>

    <video id="liveVideo" playsinline crossorigin="anonymous" muted></video>
    
    <video id="quranAudioVideo" playsinline crossorigin="anonymous"></video>
</div>

<script>
    const streamURL = 'https://live-content.xumo.com/3878/content/XM0KZ98BBZD8WF/27513672/1.m3u8';
    const quranURL = 'https://win.holol.com/live/quran/chunklist_w1767678011.m3u8';

    const video = document.getElementById('liveVideo');
    const quranVideo = document.getElementById('quranAudioVideo');
    const overlay = document.getElementById('play-overlay');

    if (Hls.isSupported()) {
        const hls1 = new Hls();
        hls1.loadSource(streamURL);
        hls1.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamURL;
    }

    if (Hls.isSupported()) {
        const hls2 = new Hls();
        hls2.loadSource(quranURL);
        hls2.attachMedia(quranVideo);
    } else if (quranVideo.canPlayType('application/vnd.apple.mpegurl')) {
        quranVideo.src = quranURL;
    }

    function startPlayer() {
        video.muted = true;       
        quranVideo.muted = false; 
        video.play();
        quranVideo.play();
        overlay.classList.add('hidden');
    }

    // 🕒 فەنکشنی بەگەڕخستنی سەعات
    function updateClock() {
        const now = new Date();
        let hours = String(now.getHours()).padStart(2, '0');
        let minutes = String(now.getMinutes()).padStart(2, '0');
        let seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 📅 فەنکشنی مێژووی هیجری
    function updateHijriDate() {
        const date = new Date();
        const options = { calendar: 'islamic-umalqura', day: 'numeric', month: 'long', year: 'numeric' };
        let hijriStr = new Intl.DateTimeFormat('ar-FR-u-ca-islamic-umalqura', options).format(date);
        document.getElementById('hijri-date').innerText = hijriStr + ' هـ';
    }
    updateHijriDate();

    // ☀️ تەنها ڕاکێشانی پلەی گەرمی (درجەکە) بەبێ ناوی شار
    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.1911&longitude=44.0092&current_weather=true');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather-temp').innerText = `${temp}°C`;
        } catch (error) {
            document.getElementById('weather-temp').innerText = `38°C`; 
        }
    }
    getWeather();
    setInterval(getWeather, 600000);

    // 🕋 بەشی نوێ و بەستنەوەی فایلی prayer_times.db بۆ هێنانە دەرەوەی کاتەکان
    const sqlConfig = {
        locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}`
    };

    let loadedDb = null;
    const NAMES = ["بەیانی", "ڕۆژهەڵات", "نیوەڕۆ", "عەسـر", "مەغریب", "عیشـا"];

    async function initDatabase() {
        try {
            const initSqlJs = window.initSqlJs;
            const SQL = await initSqlJs(sqlConfig);
            const response = await fetch('prayer_times.db');
            const arrayBuffer = await response.arrayBuffer();
            const uInt8Array = new Uint8Array(arrayBuffer);
            loadedDb = new SQL.Database(uInt8Array);
            
            // دوای ئەوەی داتابەیسەکە بە سەرکەوتوویی باربوو، کاونتداونەکە دەستپێدەکات
            setInterval(updateCountdown, 1000);
            updateCountdown();
        } catch (e) {
            console.error("هەڵە لە بارکردنی داتابەیس:", e);
            document.getElementById('infoMsg').textContent = "کێشە لە داتابەیس هەیە";
        }
    }

    function getPrayerTimesFromDB(date) {
        if (!loadedDb) return null;
        
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const dateString = `${month}-${day}`; // فۆرماتەکە: MM-DD وەک 07-09

        try {
            // ئەگەر ناوی خشتەکە prayers بێت و ستوونی بەروار date بێت
            const stmt = loadedDb.prepare("SELECT fajr, sunrise, dhuhr, asr, maghrib, isha FROM prayers WHERE date = :date LIMIT 1");
            const row = stmt.getAsObject({':date': dateString});
            stmt.free();

            if (row.fajr) {
                return [row.fajr, row.sunrise, row.dhuhr, row.asr, row.maghrib, row.isha].map((time, index) => ({
                    name: NAMES[index],
                    time: time
                }));
            }
        } catch (err) {
            console.error("هەڵەی پرسیارەکە:", err);
        }
        return null;
    }

    // 🕋 فەنکشنی حیسابکردنی کاونتداونی کاتەکانی بانگ
    function updateCountdown() {
        if (!loadedDb) return;

        const now = new Date();
        let todayTimes = getPrayerTimesFromDB(now);
        
        if (!todayTimes) {
            document.getElementById('infoMsg').textContent = "کاتی نوێژ نەدۆزرایەوە";
            return;
        }
        
        let nextPrayer = null;
        let targetTime = null;

        for (let prayer of todayTimes) {
            const [h, m] = prayer.time.split(':').map(Number);
            let t = new Date();
            t.setHours(h, m, 0, 0);

            if (t > now) {
                nextPrayer = prayer;
                targetTime = t;
                break;
            }
        }

        if (!targetTime) {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            let tomorrowTimes = getPrayerTimesFromDB(tomorrow);
            
            if (tomorrowTimes) {
                nextPrayer = tomorrowTimes[0];
                const [h, m] = nextPrayer.time.split(':').map(Number);
                targetTime = new Date();
                targetTime.setDate(targetTime.getDate() + 1);
                targetTime.setHours(h, m, 0, 0);
            }
        }

        if (targetTime && nextPrayer) {
            const diffSeconds = Math.floor((targetTime - now) / 1000);
            const hrs = Math.floor(diffSeconds / 3600);
            const mins = Math.floor((diffSeconds % 3600) / 60);
            const secs = diffSeconds % 60;

            document.getElementById('hours').textContent = String(hrs).padStart(2, '0');
            document.getElementById('minutes').textContent = String(mins).padStart(2, '0');
            document.getElementById('seconds').textContent = String(secs).padStart(2, '0');
            
            document.getElementById('prayerName').textContent = "بانگی " + nextPrayer.name + ":";
            
            const totalMins = Math.floor(diffSeconds / 60);
            document.getElementById('infoMsg').textContent = `${totalMins} خولەک ماوە بۆ بانگی ${nextPrayer.name}`;
        }
    }

    // دەستپێکردنی داتابەیسەکە لەکاتی باربوونی لاپەڕەکە
    window.onload = initDatabase;
</script>

</body>
</html>
